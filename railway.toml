[deploy]
startCommand = "bash scripts/start.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Required environment variables (set in Railway service settings):
#
#  Build-time (set BEFORE first deploy so Vite bakes them in):
#    VITE_API_URL=              ← empty string → relative /api/* paths in prod
#    PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_...
#
#  Runtime:
#    DATABASE_URL=postgresql://...
#    CLERK_JWKS_URL=https://.../.well-known/jwks.json
#    CLERK_ISSUER_URL=https://...
#    ADMIN_USER_IDS=user_abc,user_def
#    ENCRYPTION_KEY=<32-byte hex>
#    ORIGIN=https://<your-app>.railway.app  (auto-set from RAILWAY_PUBLIC_DOMAIN by start.sh)
