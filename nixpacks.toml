[phases.setup]
nixPkgs = ["python312"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "(cd frontend && npm ci --ignore-engines)",
  "pip install -r backend/requirements.txt"
]

[phases.build]
dependsOn = ["install"]
cmds = ["(cd frontend && npm run build)"]

[start]
cmd = "bash scripts/start.sh"
